<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rappi MFC — Asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #FF441B;
    --naranja-light: #FFF0ED;
    --naranja-border: #FFCFC5;
    --dark: #1A1A1A;
    --bg: #F5F5F5;
    --card: #FFFFFF;
    --line: #E5E5E5;
    --gris: #767676;
    --verde:  #00A859;
    --ambar:  #F59E0B;
    --azul:   #2563EB;
    --rojo:   #DC2626;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--dark);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ── HEADER ── */
  .header-brand {
    background:var(--naranja);
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo-text { font-size:22px; font-weight:800; color:#fff; letter-spacing:-0.5px; }
  .logo-badge {
    background:#fff;
    color:var(--naranja);
    border-radius:5px;
    padding:2px 7px;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .header-clock {
    background:var(--dark);
    padding:16px 20px 20px;
    text-align:center;
  }
  #reloj {
    font-size:52px;
    font-weight:800;
    color:#fff;
    font-variant-numeric:tabular-nums;
    letter-spacing:-2px;
    line-height:1;
  }
  #fecha { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; text-transform:capitalize; }

  /* ── PANTALLAS ── */
  .pantalla { display:none; flex:1; flex-direction:column; }
  .pantalla.activa { display:flex; }
  .contenido { padding:24px 20px; max-width:440px; width:100%; margin:0 auto; flex:1; }

  /* ── CAMPO ── */
  .campo { margin-bottom:18px; }
  .campo label {
    display:block; font-size:11px; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    color:var(--gris); margin-bottom:7px;
  }
  .campo input {
    width:100%; padding:14px 16px;
    font-size:16px; font-family:'Inter',sans-serif; font-weight:500;
    border:2px solid var(--line); border-radius:12px;
    background:var(--card); color:var(--dark);
    transition:border-color 0.15s;
  }
  .campo input:focus { outline:none; border-color:var(--naranja); }
  .campo input::placeholder { color:#BBBABA; font-weight:400; }

  /* PIN field */
  .pin-wrap { position:relative; }
  .pin-wrap input { letter-spacing:0.3em; font-size:22px; font-weight:700; padding-right:48px; }
  .pin-toggle {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    font-size:18px; color:var(--gris); padding:4px;
  }

  /* ── BOTONES ── */
  .btn {
    width:100%; padding:15px;
    border:none; border-radius:12px;
    font-family:'Inter',sans-serif; font-weight:700; font-size:16px;
    cursor:pointer; transition:transform 0.08s, filter 0.08s;
    margin-bottom:12px;
  }
  .btn:active { transform:scale(0.97); filter:brightness(0.93); }
  .btn-primario { background:var(--naranja); color:#fff; }
  .btn-secundario {
    background:transparent; color:var(--naranja);
    border:2px solid var(--naranja-border);
  }
  .btn:disabled { opacity:0.5; pointer-events:none; }

  /* ── SEPARADOR ── */
  .sep { display:flex; align-items:center; gap:12px; margin:18px 0; }
  .sep span { font-size:13px; color:var(--gris); white-space:nowrap; }
  .sep::before, .sep::after { content:''; flex:1; height:1px; background:var(--line); }

  /* ── BADGE USUARIO ── */
  .badge-usuario {
    background:var(--naranja-light);
    border:1.5px solid var(--naranja-border);
    border-radius:14px;
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
  }
  .avatar {
    width:42px; height:42px; border-radius:50%;
    background:var(--naranja); color:#fff;
    font-weight:800; font-size:16px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .badge-usuario .info { flex:1; min-width:0; }
  .badge-usuario .info .nombre-user {
    font-weight:700; font-size:15px; color:var(--dark);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .badge-usuario .info .id-user { font-size:12px; color:var(--gris); margin-top:1px; }
  .btn-salir {
    background:none; border:none; cursor:pointer;
    font-size:12px; font-weight:600; color:var(--gris);
    padding:4px 8px; border-radius:8px;
    white-space:nowrap;
  }
  .btn-salir:hover { color:var(--rojo); }

  /* ── MARCACIONES ── */
  .seccion-titulo {
    font-size:11px; font-weight:700; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--gris); margin-bottom:12px;
  }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .btn-marca {
    border:none; border-radius:16px; padding:18px 14px 16px;
    color:#fff; font-family:'Inter',sans-serif; font-weight:700;
    font-size:14px; line-height:1.25; cursor:pointer;
    text-align:left; min-height:100px;
    display:flex; flex-direction:column; justify-content:space-between;
    transition:transform 0.08s, filter 0.08s;
  }
  .btn-marca:active { transform:scale(0.96); filter:brightness(0.9); }
  .btn-marca .icono { font-size:24px; line-height:1; margin-bottom:8px; }
  .btn-marca .etiqueta { font-size:13px; font-weight:700; line-height:1.2; }
  .btn-marca .sub { font-size:11px; font-weight:500; opacity:0.75; margin-top:2px; }
  .btn-marca[data-tipo="ingreso_turno"] { background:var(--verde); }
  .btn-marca[data-tipo="inicio_break"]  { background:var(--ambar); }
  .btn-marca[data-tipo="fin_break"]     { background:var(--azul);  }
  .btn-marca[data-tipo="salida_turno"]  { background:var(--rojo);  }
  .btn-marca.hecho { opacity:0.35; pointer-events:none; }
  .btn-marca.hecho .etiqueta::after { content:' ✓'; }

  .nota-pie { font-size:12px; color:var(--gris); text-align:center; line-height:1.6; }

  /* ── MENSAJE ERROR / INFO ── */
  .msg {
    font-size:13px; font-weight:600; padding:10px 14px;
    border-radius:10px; margin-bottom:14px; display:none;
  }
  .msg.error { background:#FEE2E2; color:#991B1B; display:block; }
  .msg.info  { background:#DCFCE7; color:#166534; display:block; }

  /* ── MODAL CÁMARA ── */
  #modal {
    position:fixed; inset:0;
    background:rgba(10,10,10,0.97);
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px 20px; z-index:50;
  }
  #modal.abierto { display:flex; }
  .modal-chip {
    font-size:12px; font-weight:700; color:#fff;
    background:var(--naranja); border-radius:20px;
    padding:4px 14px; margin-bottom:12px;
    letter-spacing:0.04em; text-transform:uppercase;
  }
  #modal-titulo { color:#fff; font-size:17px; font-weight:700; margin-bottom:14px; }
  .marco {
    width:min(80vw,300px); aspect-ratio:3/4;
    border-radius:20px; overflow:hidden;
    background:#111; border:2.5px solid rgba(255,255,255,0.15);
  }
  .marco video, .marco canvas { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  .modal-acciones { display:flex; gap:10px; margin-top:16px; width:min(80vw,300px); }
  .modal-acciones button {
    flex:1; padding:13px 10px; border:none; border-radius:12px;
    font-family:'Inter',sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  .b-p { background:var(--naranja); color:#fff; }
  .b-s { background:transparent; color:rgba(255,255,255,0.7); border:1.5px solid rgba(255,255,255,0.2)!important; }
  #estado-envio { color:rgba(255,255,255,0.6); margin-top:12px; font-size:14px; min-height:20px; text-align:center; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(16px);
    background:var(--dark); color:#fff;
    padding:13px 20px; border-radius:14px;
    font-size:14px; font-weight:600;
    max-width:88vw; text-align:center;
    opacity:0; pointer-events:none;
    transition:opacity 0.22s, transform 0.22s;
    z-index:60;
  }
  #toast.visible { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.error { background:var(--rojo); }
  #toast.exito { background:var(--verde); }

  @media (prefers-reduced-motion:reduce) { *{ transition:none!important; animation:none!important; } }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header-brand">
  <div class="logo-text">rappi</div>
  <div class="logo-badge">MFC</div>
</div>
<div class="header-clock">
  <div id="reloj">--:--:--</div>
  <div id="fecha"></div>
</div>

<!-- ══ PANTALLA: LOGIN ══ -->
<div class="pantalla activa" id="p-login">
  <div class="contenido">
    <div class="campo">
      <label>Correo Gmail</label>
      <input id="login-gmail" type="email" placeholder="tunombre@gmail.com" inputmode="email" autocomplete="email">
    </div>
    <div class="campo">
      <label>PIN (4 dígitos)</label>
      <div class="pin-wrap">
        <input id="login-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="current-password">
        <button class="pin-toggle" onclick="togglePin('login-pin',this)" type="button">👁</button>
      </div>
    </div>
    <div id="login-msg" class="msg"></div>
    <button class="btn btn-primario" id="btn-login">Ingresar</button>
    <div class="sep"><span>¿Primera vez?</span></div>
    <button class="btn btn-secundario" onclick="mostrarPantalla('p-registro')">Crear mi cuenta</button>
  </div>
</div>

<!-- ══ PANTALLA: REGISTRO ══ -->
<div class="pantalla" id="p-registro">
  <div class="contenido">
    <div class="campo">
      <label>Nombre completo</label>
      <input id="reg-nombre" type="text" placeholder="Ej: María Torres" autocomplete="name">
    </div>
    <div class="campo">
      <label>Correo Gmail</label>
      <input id="reg-gmail" type="email" placeholder="tunombre@gmail.com" inputmode="email" autocomplete="email">
    </div>
    <div class="campo">
      <label>Elige tu PIN (4 dígitos)</label>
      <div class="pin-wrap">
        <input id="reg-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
        <button class="pin-toggle" onclick="togglePin('reg-pin',this)" type="button">👁</button>
      </div>
    </div>
    <div class="campo">
      <label>Confirma tu PIN</label>
      <div class="pin-wrap">
        <input id="reg-pin2" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
        <button class="pin-toggle" onclick="togglePin('reg-pin2',this)" type="button">👁</button>
      </div>
    </div>
    <div id="reg-msg" class="msg"></div>
    <button class="btn btn-primario" id="btn-registro">Crear cuenta</button>
    <div class="sep"><span>¿Ya tienes cuenta?</span></div>
    <button class="btn btn-secundario" onclick="mostrarPantalla('p-login')">Iniciar sesión</button>
  </div>
</div>

<!-- ══ PANTALLA: MARCACIONES ══ -->
<div class="pantalla" id="p-marcaciones">
  <div class="contenido">
    <div class="badge-usuario">
      <div class="avatar" id="avatar-iniciales">--</div>
      <div class="info">
        <div class="nombre-user" id="user-nombre">--</div>
        <div class="id-user" id="user-id">--</div>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
    </div>

    <div class="seccion-titulo">Registrar marcación</div>
    <div class="grid">
      <button class="btn-marca" data-tipo="ingreso_turno">
        <div class="icono">▶</div>
        <div><div class="etiqueta">Ingreso de turno</div><div class="sub">Inicio de jornada</div></div>
      </button>
      <button class="btn-marca" data-tipo="inicio_break">
        <div class="icono">⏸</div>
        <div><div class="etiqueta">Inicio de break</div><div class="sub">Salida a descanso</div></div>
      </button>
      <button class="btn-marca" data-tipo="fin_break">
        <div class="icono">↩</div>
        <div><div class="etiqueta">Fin de break</div><div class="sub">Regreso al turno</div></div>
      </button>
      <button class="btn-marca" data-tipo="salida_turno">
        <div class="icono">■</div>
        <div><div class="etiqueta">Salida de turno</div><div class="sub">Fin de jornada</div></div>
      </button>
    </div>
    <p class="nota-pie">Cada marcación registra selfie y ubicación GPS.<br>Permite el acceso cuando el dispositivo lo solicite.</p>
  </div>
</div>

<!-- ══ MODAL CÁMARA ══ -->
<div id="modal">
  <div class="modal-chip">Rappi MFC</div>
  <div id="modal-titulo">Selfie de marcación</div>
  <div class="marco">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>
  </div>
  <div class="modal-acciones">
    <button class="b-s" id="btn-cancelar">Cancelar</button>
    <button class="b-p" id="btn-capturar">Tomar selfie</button>
    <button class="b-p" id="btn-confirmar" style="display:none">Confirmar</button>
    <button class="b-s" id="btn-repetir"   style="display:none">Repetir</button>
  </div>
  <div id="estado-envio"></div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   CONFIGURACIÓN — pega tu URL de Apps Script
══════════════════════════════════════════════ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHBcNgnrr0ihTByaWew6DY8KM3l16b4Z9CrWyXNJwwM5RSa4IxctbnUbZI8xoxhkNEpg/exec';

const ETIQUETAS = {
  ingreso_turno: 'Ingreso de turno',
  inicio_break:  'Inicio de break',
  fin_break:     'Fin de break',
  salida_turno:  'Salida de turno'
};

let sesion = null;   // { id, nombre }
let tipoActual = null;
let stream = null;
let fotoBase64 = null;

/* ─── Reloj ─── */
function tick() {
  const d = new Date();
  document.getElementById('reloj').textContent = d.toLocaleTimeString('es-PE',{hour12:false});
  document.getElementById('fecha').textContent  = d.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(tick,1000); tick();

/* ─── Navegación entre pantallas ─── */
function mostrarPantalla(id) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  document.getElementById(id).classList.add('activa');
  limpiarMensajes();
}

function limpiarMensajes() {
  document.querySelectorAll('.msg').forEach(m => { m.className='msg'; m.textContent=''; });
}

function mostrarMsg(idMsg, texto, tipo) {
  const el = document.getElementById(idMsg);
  el.textContent = texto;
  el.className = 'msg ' + tipo;
}

/* ─── Restaurar sesión guardada ─── */
try {
  const s = JSON.parse(localStorage.getItem('rappi_sesion') || 'null');
  if (s && s.id && s.nombre) {
    sesion = s;
    aplicarSesion();
    mostrarPantalla('p-marcaciones');
  }
} catch(e) {}

/* ─── LOGIN ─── */
document.getElementById('btn-login').addEventListener('click', async () => {
  const gmail = document.getElementById('login-gmail').value.trim().toLowerCase();
  const pin   = document.getElementById('login-pin').value.trim();
  if (!gmail || !pin) { mostrarMsg('login-msg','Completa todos los campos.','error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Verificando…';
  limpiarMensajes();

  try {
    const res = await api({ accion:'login', gmail, pin });
    if (res.ok) {
      sesion = { id: res.id, nombre: res.nombre };
      localStorage.setItem('rappi_sesion', JSON.stringify(sesion));
      aplicarSesion();
      restaurarMarcacionesHoy();
      mostrarPantalla('p-marcaciones');
    } else {
      mostrarMsg('login-msg', res.error, 'error');
    }
  } catch(e) {
    mostrarMsg('login-msg','Error de conexión. Revisa tu internet.','error');
  } finally {
    btn.disabled=false; btn.textContent='Ingresar';
  }
});

/* ─── REGISTRO ─── */
document.getElementById('btn-registro').addEventListener('click', async () => {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const gmail  = document.getElementById('reg-gmail').value.trim().toLowerCase();
  const pin    = document.getElementById('reg-pin').value.trim();
  const pin2   = document.getElementById('reg-pin2').value.trim();

  if (!nombre||!gmail||!pin||!pin2){ mostrarMsg('reg-msg','Completa todos los campos.','error'); return; }
  if (!/^\d{4}$/.test(pin)){ mostrarMsg('reg-msg','El PIN debe ser exactamente 4 dígitos.','error'); return; }
  if (pin !== pin2){ mostrarMsg('reg-msg','Los PINs no coinciden.','error'); return; }
  if (!/@gmail\.com$/.test(gmail)){ mostrarMsg('reg-msg','Ingresa un correo Gmail válido.','error'); return; }

  const btn = document.getElementById('btn-registro');
  btn.disabled=true; btn.textContent='Creando cuenta…';
  limpiarMensajes();

  try {
    const res = await api({ accion:'registrar', nombre, gmail, pin });
    if (res.ok) {
      sesion = { id: res.id, nombre: res.nombre };
      localStorage.setItem('rappi_sesion', JSON.stringify(sesion));
      aplicarSesion();
      mostrarPantalla('p-marcaciones');
      mostrarToast('¡Bienvenido! Tu ID es ' + res.id, 'exito');
    } else {
      mostrarMsg('reg-msg', res.error, 'error');
    }
  } catch(e) {
    mostrarMsg('reg-msg','Error de conexión. Revisa tu internet.','error');
  } finally {
    btn.disabled=false; btn.textContent='Crear cuenta';
  }
});

/* ─── Aplicar sesión a la UI ─── */
function aplicarSesion() {
  if (!sesion) return;
  document.getElementById('user-nombre').textContent = sesion.nombre;
  document.getElementById('user-id').textContent = sesion.id;
  const iniciales = sesion.nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
  document.getElementById('avatar-iniciales').textContent = iniciales;
}

/* ─── Cerrar sesión ─── */
function cerrarSesion() {
  sesion = null;
  try { localStorage.removeItem('rappi_sesion'); } catch(e){}
  document.querySelectorAll('.btn-marca').forEach(b=>b.classList.remove('hecho'));
  mostrarPantalla('p-login');
}

/* ─── Toggle PIN visible ─── */
function togglePin(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

/* ─── MARCACIONES ─── */
document.querySelectorAll('.btn-marca').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (!sesion) return;
    if (SCRIPT_URL.indexOf('http') !== 0) {
      mostrarToast('App no conectada. Contacta al administrador.','error'); return;
    }
    tipoActual = btn.dataset.tipo;
    document.getElementById('modal-titulo').textContent = ETIQUETAS[tipoActual];
    abrirModal();
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'user',width:{ideal:720}}, audio:false });
      document.getElementById('video').srcObject = stream;
    } catch(e) {
      cerrarModal();
      mostrarToast('No se pudo abrir la cámara. Revisa los permisos.','error');
    }
  });
});

function abrirModal() {
  fotoBase64 = null;
  document.getElementById('video').style.display='block';
  document.getElementById('canvas').style.display='none';
  document.getElementById('btn-capturar').style.display='inline-block';
  document.getElementById('btn-confirmar').style.display='none';
  document.getElementById('btn-repetir').style.display='none';
  document.getElementById('btn-cancelar').style.display='inline-block';
  document.getElementById('estado-envio').textContent='';
  document.getElementById('modal').classList.add('abierto');
}

function cerrarModal() {
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('modal').classList.remove('abierto');
}

document.getElementById('btn-cancelar').addEventListener('click', cerrarModal);

document.getElementById('btn-capturar').addEventListener('click', () => {
  const video=document.getElementById('video'), canvas=document.getElementById('canvas');
  const escala=Math.min(1,640/video.videoWidth);
  canvas.width=video.videoWidth*escala; canvas.height=video.videoHeight*escala;
  canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
  fotoBase64=canvas.toDataURL('image/jpeg',0.72).split(',')[1];
  video.style.display='none'; canvas.style.display='block';
  document.getElementById('btn-capturar').style.display='none';
  document.getElementById('btn-confirmar').style.display='inline-block';
  document.getElementById('btn-repetir').style.display='inline-block';
});

document.getElementById('btn-repetir').addEventListener('click', () => {
  fotoBase64=null;
  document.getElementById('video').style.display='block';
  document.getElementById('canvas').style.display='none';
  document.getElementById('btn-capturar').style.display='inline-block';
  document.getElementById('btn-confirmar').style.display='none';
  document.getElementById('btn-repetir').style.display='none';
});

document.getElementById('btn-confirmar').addEventListener('click', async () => {
  const estado=document.getElementById('estado-envio');
  const btnC=document.getElementById('btn-confirmar');
  const btnR=document.getElementById('btn-repetir');
  btnC.disabled=true; btnR.style.display='none';
  document.getElementById('btn-cancelar').style.display='none';
  estado.textContent='Obteniendo ubicación…';

  let lat='', lng='';
  try {
    const pos = await new Promise((res,rej)=>
      navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:12000})
    );
    lat=pos.coords.latitude.toFixed(6); lng=pos.coords.longitude.toFixed(6);
  } catch(e) {
    estado.textContent='';
    mostrarToast('No se pudo obtener ubicación. Activa el GPS.','error');
    btnC.disabled=false; btnR.style.display='inline-block';
    document.getElementById('btn-cancelar').style.display='inline-block';
    return;
  }

  estado.textContent='Registrando marcación…';
  const ahora=new Date();
  const fecha=ahora.getFullYear()+'-'+String(ahora.getMonth()+1).padStart(2,'0')+'-'+String(ahora.getDate()).padStart(2,'0');
  const hora=ahora.toLocaleTimeString('es-PE',{hour12:false});

  try {
    const res = await api({
      accion:'marcar',
      id:sesion.id, nombre:sesion.nombre,
      tipo:tipoActual, fecha, hora, lat, lng, foto:fotoBase64
    });
    cerrarModal();
    if(res.ok){
      mostrarToast('✓ '+res.mensaje,'exito');
      marcarHecho(tipoActual);
    } else {
      mostrarToast(res.error||'No se pudo registrar.','error');
    }
  } catch(e) {
    cerrarModal();
    mostrarToast('Error de conexión. Revisa tu internet.','error');
  } finally { btnC.disabled=false; }
});

function marcarHecho(tipo) {
  const btn=document.querySelector('.btn-marca[data-tipo="'+tipo+'"]');
  if(btn) btn.classList.add('hecho');
  try {
    const hoy=new Date().toDateString();
    const reg=JSON.parse(localStorage.getItem('rappi_hoy_'+(sesion?sesion.id:''))||'{}');
    if(reg.dia!==hoy){reg.dia=hoy;reg.tipos=[];}
    reg.tipos.push(tipo);
    localStorage.setItem('rappi_hoy_'+(sesion?sesion.id:''), JSON.stringify(reg));
  } catch(e){}
}

function restaurarMarcacionesHoy() {
  if(!sesion) return;
  try {
    const reg=JSON.parse(localStorage.getItem('rappi_hoy_'+sesion.id)||'{}');
    if(reg.dia===new Date().toDateString()&&Array.isArray(reg.tipos)){
      reg.tipos.forEach(t=>{
        const b=document.querySelector('.btn-marca[data-tipo="'+t+'"]');
        if(b) b.classList.add('hecho');
      });
    }
  } catch(e){}
}

/* ─── API helper ─── */
async function api(payload) {
  const resp = await fetch(SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  return resp.json();
}

/* ─── Toast ─── */
let toastTimer=null;
function mostrarToast(msg,tipo){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='visible '+(tipo||'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='';},4500);
}
</script>
